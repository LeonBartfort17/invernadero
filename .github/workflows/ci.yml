name: CI - Invernadero

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ══════════════════════════════════════════════════════════════════════
  # JOB 1 — Backend: compilar + pruebas JUnit
  # ══════════════════════════════════════════════════════════════════════
  backend:
    name: Backend - Compilar y Pruebas JUnit
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: invernadero_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: hatsune
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🗄️ Crear tablas en la BD de prueba
        run: |
          sudo apt-get install -y postgresql-client
          PGPASSWORD=hatsune psql -h localhost -U postgres -d invernadero_db << SQL
          CREATE EXTENSION IF NOT EXISTS "pgcrypto";
          CREATE TABLE IF NOT EXISTS usuarios (
            id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            nombre VARCHAR(255) NOT NULL,
            email VARCHAR(255) UNIQUE NOT NULL,
            password_hash VARCHAR(255),
            rol VARCHAR(50) CHECK (rol IN ('ADMIN','OPERADOR','VIEWER')),
            created_at TIMESTAMP DEFAULT NOW()
          );
          CREATE TABLE IF NOT EXISTS invernaderos (
            id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            nombre VARCHAR(255) NOT NULL,
            ubicacion VARCHAR(255),
            area_m2 DOUBLE PRECISION,
            tipo VARCHAR(50) CHECK (tipo IN ('CONVENCIONAL','HIDROPONICO','ACUAPONICO')),
            activo BOOLEAN DEFAULT true,
            created_at TIMESTAMP DEFAULT NOW(),
            usuario_id UUID REFERENCES usuarios(id)
          );
          CREATE TABLE IF NOT EXISTS zonas (
            id BIGSERIAL PRIMARY KEY,
            nombre VARCHAR(255) NOT NULL,
            tipo_cultivo VARCHAR(255),
            area_total DOUBLE PRECISION,
            created_at TIMESTAMP DEFAULT NOW(),
            invernadero_id UUID NOT NULL REFERENCES invernaderos(id)
          );
          SQL

      - name: 🔍 Verificar Gradle wrapper
        run: ./gradlew --version

      - name: 🔨 Compilar proyecto
        run: ./gradlew compileJava --no-daemon

      - name: ✅ Correr pruebas JUnit
        run: ./gradlew test --tests "com.usco.invernadero.InvernaderoApplicationTests" --no-daemon --info
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: 📊 Publicar reporte de pruebas
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reporte-backend
          path: build/reports/tests/test/

  # ══════════════════════════════════════════════════════════════════════
  # JOB 2 — Frontend: instalar + compilar
  # ══════════════════════════════════════════════════════════════════════
  frontend:
    name: Frontend - Instalar y Compilar
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Instalar dependencias
        working-directory: frontend
        run: npm install

      - name: 🔨 Build de producción (con VITE_API_URL de prueba)
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8080

      - name: 📊 Publicar build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/

  # ══════════════════════════════════════════════════════════════════════
  # JOB 3 — Deploy Frontend → Vercel
  # Solo en push a main. Requiere secrets:
  #   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID, RENDER_BACKEND_URL
  # ══════════════════════════════════════════════════════════════════════
  deploy-frontend:
    name: 🚀 Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: frontend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Instalar Vercel CLI
        run: npm install -g vercel@latest

      - name: 📦 Instalar dependencias del frontend
        working-directory: frontend
        run: npm install

      - name: 🔨 Build de producción con URL de Render
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.RENDER_BACKEND_URL }}

      - name: 🔗 Vincular proyecto con Vercel
        working-directory: frontend
        run: vercel link --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 🚀 Desplegar en Vercel (producción)
        working-directory: frontend
        run: vercel deploy --prebuilt --prod --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ══════════════════════════════════════════════════════════════════════
  # JOB 4 — Deploy Backend → Render
  # Render auto-despliega desde GitHub. Este job fuerza un redeploy
  # vía webhook. Configura RENDER_DEPLOY_HOOK_URL en los secrets.
  # ══════════════════════════════════════════════════════════════════════
  deploy-backend:
    name: 🚀 Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 🔔 Disparar deploy en Render
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
              -H "Content-Type: application/json" \
              && echo "✅ Deploy de Render disparado correctamente"
          else
            echo "⚠️  RENDER_DEPLOY_HOOK_URL no configurado — Render hace deploy automático desde GitHub."
          fi
