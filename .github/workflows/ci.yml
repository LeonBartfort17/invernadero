name: CI - Invernadero

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  backend:
    name: Backend - Compilar y Pruebas JUnit
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: invernadero_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: hatsune
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🗄️ Crear tablas en la BD de prueba
        run: |
          sudo apt-get install -y postgresql-client
          PGPASSWORD=hatsune psql -h localhost -U postgres -d invernadero_db << SQL
          CREATE EXTENSION IF NOT EXISTS "pgcrypto";
          CREATE TABLE IF NOT EXISTS usuarios (
            id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            nombre VARCHAR(255) NOT NULL,
            email VARCHAR(255) UNIQUE NOT NULL,
            password_hash VARCHAR(255),
            rol VARCHAR(50) CHECK (rol IN ('ADMIN','OPERADOR','VIEWER')),
            created_at TIMESTAMP DEFAULT NOW()
          );
          CREATE TABLE IF NOT EXISTS invernaderos (
            id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            nombre VARCHAR(255) NOT NULL,
            ubicacion VARCHAR(255),
            area_m2 DOUBLE PRECISION,
            tipo VARCHAR(50) CHECK (tipo IN ('CONVENCIONAL','HIDROPONICO','ACUAPONICO')),
            activo BOOLEAN DEFAULT true,
            created_at TIMESTAMP DEFAULT NOW(),
            usuario_id UUID REFERENCES usuarios(id)
          );
          CREATE TABLE IF NOT EXISTS zonas (
            id BIGSERIAL PRIMARY KEY,
            nombre VARCHAR(255) NOT NULL,
            tipo_cultivo VARCHAR(255),
            area_total DOUBLE PRECISION,
            created_at TIMESTAMP DEFAULT NOW(),
            invernadero_id UUID NOT NULL REFERENCES invernaderos(id)
          );
          SQL

      - name: 🔨 Compilar proyecto
        run: ./gradlew compileJava --no-daemon

      - name: ✅ Correr pruebas JUnit (contextLoads)
        run: ./gradlew test --tests "com.usco.invernadero.InvernaderoApplicationTests" --no-daemon --info

      - name: 📊 Publicar reporte de pruebas
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reporte-backend
          path: build/reports/tests/test/

  frontend:
    name: Frontend - Instalar y Compilar
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Instalar dependencias
        working-directory: frontend
        run: npm install

      - name: 🔨 Compilar frontend (con sidebar + Taiga + Usuarios)
        working-directory: frontend
        run: npm run build

      - name: 📊 Publicar build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/

  # ──────────────────────────────────────────────────────────────────────
  # DESPLIEGUE — Vercel (Frontend) + Render (Backend)
  # Requiere secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
  # ──────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: 🚀 Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: frontend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Instalar Vercel CLI
        run: npm install -g vercel

      - name: 📦 Instalar dependencias del frontend
        working-directory: frontend
        run: npm install

      - name: 🔨 Build de producción
        working-directory: frontend
        run: npm run build
        env:
          # URL del backend en Render (configura este secret en GitHub)
          VITE_API_URL: ${{ secrets.RENDER_BACKEND_URL }}

      - name: 🚀 Desplegar en Vercel
        working-directory: frontend
        run: |
          vercel deploy --prod --yes \
            --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-backend:
    name: 🚀 Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 🔔 Trigger deploy en Render
        # Render auto-deploys desde GitHub. Este paso fuerza un redeploy vía webhook.
        # Configura RENDER_DEPLOY_HOOK_URL en los secrets de GitHub.
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            || echo "⚠️ Render deploy hook no configurado — el deploy automático de Render se encarga."
