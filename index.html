<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIoT Invernaderos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand" href="#">🌱 Sistema de Gestión de Invernaderos AIoT</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h4 class="mb-0">Mis Zonas Registradas</h4>
                </div>
                <div class="card-body">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Nombre de la Zona</th>
                                <th>Descripción</th>
                                <th>Fecha de Registro</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-zonas">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0">Añadir Zona</h5>
                </div>
                <div class="card-body">
                    <form id="form-zona">
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="nombreZona" placeholder="Ej: Zona Norte" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            <input type="text" class="form-control" id="descZona" placeholder="Ej: Cultivos de Tomate" required>
                        </div>
                        <button type="button" class="btn btn-success w-100" onclick="alert('Función de guardar en construcción')">Guardar Zona</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Esta función se ejecuta automáticamente al cargar la página
    document.addEventListener("DOMContentLoaded", function() {
        cargarZonas();
    });

    function cargarZonas() {
        // Hacemos una petición GET a tu backend de Spring Boot
        fetch('/api/zonas')
            .then(response => response.json())
            .then(data => {
                const tbody = document.getElementById('tabla-zonas');
                tbody.innerHTML = ''; // Limpiamos la tabla
                
                // Recorremos los datos y creamos las filas automáticamente
                data.forEach(zona => {
                    const fila = `
                        <tr>
                            <td><strong>${zona.nombre}</strong></td>
                            <td>${zona.descripcion != null ? zona.descripcion : 'Sin descripción'}</td>
                            <td>${new Date(zona.createdAt).toLocaleDateString()}</td>
                        </tr>
                    `;
                    tbody.innerHTML += fila;
                });
            })
            .catch(error => {
                console.error('Error al cargar las zonas:', error);
                document.getElementById('tabla-zonas').innerHTML = '<tr><td colspan="3" class="text-center text-danger">No se pudieron cargar los datos. Verifica que el backend esté corriendo.</td></tr>';
            });
    }
</script>

</body>
</html>
