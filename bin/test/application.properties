# ── Configuración SOLO para pruebas ──────────────────────────────────────
# Este archivo se usa en ./gradlew test y reemplaza el application.properties principal

spring.application.name=invernadero-test

# ── PostgreSQL (mismo que CI) ─────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/invernadero_db
spring.datasource.username=postgres
spring.datasource.password=hatsune
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ───────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ── Deshabilitar OAuth2 en pruebas ────────────────────────────────────────
# Sin esto Spring falla al arrancar porque valida las credenciales de Google
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration

# ── Seguridad simplificada para pruebas ──────────────────────────────────
spring.security.user.name=test
spring.security.user.password=test

# JWT
jwt.secret=clave-super-secreta-de-desarrollo-local-32chars
jwt.expiration=86400000
