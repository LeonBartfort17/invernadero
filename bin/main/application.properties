spring.application.name=invernadero

# ── PostgreSQL (lee variables de entorno de Render) ───────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/invernadero_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:hatsune}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ── OAuth2 Google (lee variables de entorno de Render) ────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${RENDER_EXTERNAL_URL:http://localhost:8080}/login/oauth2/code/google

# ── CORS / Frontend URL ───────────────────────────────────────────────────
allowed.origin=${ALLOWED_ORIGIN:http://localhost:5173}

# ── Sesión ────────────────────────────────────────────────────────────────
server.servlet.session.timeout=8h
