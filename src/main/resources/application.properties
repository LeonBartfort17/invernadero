spring.application.name=invernadero

# ── PostgreSQL ────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/invernadero_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:hatsune}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ── OAuth2 Google ─────────────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${RENDER_EXTERNAL_URL:http://localhost:8080}/login/oauth2/code/google

# ── JWT ───────────────────────────────────────────────────────────────────
# En Render: agrega JWT_SECRET como variable de entorno (mínimo 32 caracteres)
jwt.secret=${JWT_SECRET:clave-super-secreta-de-desarrollo-local-32chars}
jwt.expiration=86400000

# ── CORS / Frontend URL ───────────────────────────────────────────────────
allowed.origin=${ALLOWED_ORIGIN:http://localhost:5173}

# ── Sin sesiones (JWT es stateless) ──────────────────────────────────────
server.servlet.session.timeout=1s
